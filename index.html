<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSV Portfolio Converter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Open-source tool idee</p>
          <h1>CSV Portfolio Converter</h1>
          <p class="intro">
            Zet holdings-exports om naar een importeerbaar transactie-CSV met
            de kolommen Symbol, Side, Qty, Fill Price, Commission en Closing Time.
          </p>
        </div>
        <div class="status-card" aria-live="polite">
          <span class="status-label">Status</span>
          <strong id="statusText">Klaar voor een CSV</strong>
        </div>
      </section>

      <section class="tool-grid">
        <div class="panel upload-panel">
          <label class="dropzone" id="dropzone">
            <input id="fileInput" type="file" accept=".csv,text/csv" />
            <span class="upload-icon" aria-hidden="true">CSV</span>
            <strong>Sleep je CSV hierheen of klik om te kiezen</strong>
            <small>Werkt volledig lokaal in je browser.</small>
          </label>

          <div class="settings">
            <label>
              Side
              <select id="sideSelect">
                <option value="Buy">Buy</option>
                <option value="Sell">Sell</option>
              </select>
            </label>
            <label>
              Commission
              <input id="commissionInput" type="number" min="0" step="0.01" value="0" />
            </label>
          </div>
        </div>

        <div class="panel">
          <div class="panel-heading">
            <h2>Mapping</h2>
            <button id="convertButton" type="button" disabled>Converteren</button>
          </div>
          <div id="mappingList" class="mapping-list">
            <p class="empty">Upload een CSV om de kolommen te herkennen.</p>
          </div>
        </div>
      </section>

      <section class="panel preview-panel">
        <div class="panel-heading">
          <h2>Preview</h2>
          <button id="downloadButton" type="button" disabled>Download CSV</button>
        </div>
        <div class="table-wrap">
          <table id="previewTable">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
